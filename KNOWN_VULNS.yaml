# KNOWN_VULNS — ground-truth vulnerability catalog
# Purpose: answer key for benchmarking Scantonomous scan findings against this app.
# Diff scanner output vs. this file: a hit on a `vulnerable_source` path == true positive;
# a hit on a `secure_source` path == false positive.
#
# Schema per entry (benchmark variant — carries case-count fields):
#   id                    stable slug for this vuln class
#   category              benchmark test category
#   cwe                   primary CWE id(s)
#   owasp                 OWASP Top 10 (2021) category
#   true_positive_count   number of real-vulnerability cases in this category
#   false_positive_count  number of safe/decoy cases in this category
#   vulnerable_source     authoritative answer-key file / source dirs
#   ground_truth_file     path to the shipped answer key
#   notes                 context / caveats

app: BenchmarkJava
full_name: OWASP Benchmark (Java)
upstream: https://github.com/OWASP-Benchmark/BenchmarkJava
fork: https://github.com/tomj12k/BenchmarkJava
language: Java
scan_surface: [SAST-java, DAST-web]
catalog_notes: >
  OWASP Benchmark ships its own labeled answer key: expectedresults-1.2.csv at the
  repo root. Each of the 2740 BenchmarkTestNNNNN test cases is labeled with its
  category, a boolean "real vulnerability" flag (true = true positive / genuinely
  exploitable, false = safe decoy for measuring false positives), and its CWE.
  Per OWASP methodology this catalog is SUMMARIZED one entry per category rather
  than one entry per test case. All true_positive_count / false_positive_count
  values below were produced by parsing expectedresults-1.2.csv with awk
  (group by category+cwe, count real==true vs real==false). Totals across all
  categories: 1415 true positives + 1325 false positives = 2740 cases.
  The CSV is the authoritative ground truth; the generated Java test cases live
  under src/main/java/org/owasp/benchmark/testcode/ (file name == test name).

